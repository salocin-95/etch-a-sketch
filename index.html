<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Etch-a-sketch</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header">
        <div class="container">
            <h1 class="title">Etch-a-sketch</h1>
        </div>
    </header>
    <main class="main container">
                <div class="settings">
                    <input id="colorPicker" type="color" value="#333333">
                    <button class="btn brush-mode">
                        Brush Mode
                    </button>
                    <button class="btn rainbow-mode">
                        Rainbow Mode
                    </button>
                    <button class="btn eraser">
                        Eraser Mode
                    </button>
                    <button class="btn clear">
                        Clear
                    </button>
                    <div class="size-value">
                    </div>
                    <input id="sizeSlider" type="range" value="16" min="1" max="64">
                </div>
            <div id ="grid" class="grid">
            </div>
    </main>
    <footer class="footer container">By Rodrigo Nicolas</footer>
    <script src="script.js"></script>
</body>
</html>
